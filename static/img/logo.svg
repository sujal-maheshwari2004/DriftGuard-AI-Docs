<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer hex ring -->
  <polygon
    points="24,3 42,13.5 42,34.5 24,45 6,34.5 6,13.5"
    stroke="#f59e0b"
    stroke-width="1.5"
    fill="none"
    opacity="0.4"
  />
  <!-- Inner hex filled -->
  <polygon
    points="24,10 36,17 36,31 24,38 12,31 12,17"
    stroke="#f59e0b"
    stroke-width="1"
    fill="rgba(245,158,11,0.08)"
  />
  <!-- Graph node center -->
  <circle cx="24" cy="24" r="3.5" fill="#f59e0b" />
  <!-- Graph edges radiating out -->
  <line x1="24" y1="24" x2="24" y2="14" stroke="#f59e0b" stroke-width="1" opacity="0.6" />
  <line x1="24" y1="24" x2="33" y2="29" stroke="#f59e0b" stroke-width="1" opacity="0.6" />
  <line x1="24" y1="24" x2="15" y2="29" stroke="#f59e0b" stroke-width="1" opacity="0.6" />
  <!-- Satellite nodes -->
  <circle cx="24" cy="13" r="2" fill="#f59e0b" opacity="0.7" />
  <circle cx="33.5" cy="29.5" r="2" fill="#f59e0b" opacity="0.7" />
  <circle cx="14.5" cy="29.5" r="2" fill="#f59e0b" opacity="0.7" />
  <!-- Warning tick mark top-right -->
  <circle cx="37" cy="11" r="5" fill="#0a0d0f" />
  <circle cx="37" cy="11" r="4.5" fill="#f59e0b" opacity="0.9" />
  <text x="37" y="14.5" text-anchor="middle" font-size="7" font-weight="bold" fill="#0a0d0f" font-family="monospace">!</text>
</svg>
